<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Event Registration Management System</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Navigation -->

    <header>

        <nav class="navbar">

            <div class="logo">ERMS</div>

            <ul class="nav-links">

                <li><a href="index.html">Home</a></li>

                <li><a href="login.html" class="active">Login/Register</a></li>

                <li><a href="events.html">Event Listing</a></li>

                <li><a href="registration.html">Registration Form</a></li>

                <li><a href="attendance.html">Attendance / QR</a></li>

                <li><a href="dashboard.html">Dashboard</a></li>

                <li><a href="certificates.html">Certificates</a></li>

            </ul>

            <div class="menu-btn">☰</div>

        </nav>

    </header>

    <!-- Login & Register -->

    <section class="auth-section">

        <div class="auth-container">

            <div class="form-toggle">

                <button class="toggle-btn active" id="loginBtn">
                    Login
                </button>

                <button class="toggle-btn" id="registerBtn">
                    Register
                </button>

            </div>

            <!-- LOGIN -->

            <form id="loginForm" class="auth-form">

                <h2>Welcome Back</h2>

                <p>Login to your account</p>

                <input type="email"
                    placeholder="Email Address"
                    required>

                <input type="password"
                    placeholder="Password"
                    required>

                <button type="submit"
                    class="btn auth-btn">
                    Login
                </button>

                <p class="small-text">
                    Forgot Password?
                </p>

            </form>

            <!-- REGISTER -->

            <form id="registerForm"
                class="auth-form hidden">

                <h2>Create Account</h2>

                <p>Register to join upcoming events</p>

                <input type="text"
                    placeholder="Full Name"
                    required>

                <input type="email"
                    placeholder="Email Address"
                    required>

                <input type="text"
                    placeholder="Contact Number"
                    required>

                <input type="password"
                    placeholder="Password"
                    required>

                <input type="password"
                    placeholder="Confirm Password"
                    required>

                <button type="submit"
                    class="btn auth-btn">
                    Register
                </button>

            </form>

        </div>

    </section>

    <footer>

        <p>
            © 2026 Event Registration Management System
        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
